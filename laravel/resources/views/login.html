<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rytmia · Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ──────────────────────────────────────────────── */
    :root {
      --burgundy:   #6B1A3A;
      --rose:       #C45C7E;
      --blush:      #F2D5DF;
      --cream:      #FDF6F0;
      --text:       #2A1520;
      --muted:      #9B7080;
      --error:      #D94F4F;
      --radius:     14px;
      --shadow:     0 8px 40px rgba(107,26,58,.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      /* Subtle patterned background */
      background-image:
        radial-gradient(ellipse 80% 60% at 70% 10%, rgba(196,92,126,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 10% 90%, rgba(107,26,58,.08) 0%, transparent 55%);
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 2.8rem 2.5rem 2.5rem;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ───────────────────────────────────────────────────── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--burgundy), var(--rose));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--burgundy);
      letter-spacing: -.01em;
    }

    .logo-sub {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Form ───────────────────────────────────────────────────── */
    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: .45rem;
      letter-spacing: .01em;
    }

    input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid #E8D5DC;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--text);
      background: var(--cream);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--rose);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(196,92,126,.15);
    }

    input.error-input {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(217,79,79,.12);
    }

    /* DNI uppercase */
    #dni { text-transform: uppercase; letter-spacing: .06em; }

    /* ── Password toggle ────────────────────────────────────────── */
    .password-wrap {
      position: relative;
    }

    .password-wrap input { padding-right: 2.8rem; }

    .toggle-pw {
      position: absolute;
      right: .85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color .2s;
    }

    .toggle-pw:hover { color: var(--rose); }

    /* ── Error message ──────────────────────────────────────────── */
    .error-msg {
      display: none;
      font-size: .8rem;
      color: var(--error);
      margin-top: .35rem;
    }

    .error-msg.visible { display: block; }

    /* ── Alert banner ───────────────────────────────────────────── */
    .alert {
      display: none;
      background: #FEF0F0;
      border: 1px solid rgba(217,79,79,.3);
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .85rem;
      color: var(--error);
      margin-bottom: 1.2rem;
      animation: shake .35s ease;
    }

    .alert.visible { display: block; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ── Submit button ──────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, var(--burgundy) 0%, var(--rose) 100%);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      letter-spacing: .02em;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      margin-top: .4rem;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover  { opacity: .9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    /* Spinner inside button */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { opacity: 0; }

    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── Footer ─────────────────────────────────────────────────── */
    .card-footer {
      text-align: center;
      margin-top: 1.6rem;
      font-size: .8rem;
      color: var(--muted);
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="card" role="main">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">🎀</div>
    <span class="logo-name">Rytmia</span>
    <span class="logo-sub">Inicia sesión en tu espacio de entrenamiento</span>
  </div>

  <!-- Alert de error global -->
  <div id="alert" class="alert" role="alert" aria-live="polite"></div>

  <!-- Formulario -->
  <form id="loginForm" novalidate>

    <!-- DNI -->
    <div class="field">
      <label for="dni">DNI</label>
      <input
        type="text"
        id="dni"
        name="dni"
        placeholder="12345678A"
        maxlength="9"
        autocomplete="username"
        inputmode="text"
        required
      />
      <span class="error-msg" id="dni-error">Introduce un DNI válido (8 números + letra).</span>
    </div>

    <!-- Contraseña -->
    <div class="field">
      <label for="password">Contraseña</label>
      <div class="password-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
        <button type="button" class="toggle-pw" aria-label="Mostrar contraseña" id="togglePw">
          <!-- Eye icon -->
          <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <span class="error-msg" id="pw-error">La contraseña no puede estar vacía.</span>
    </div>

    <!-- Botón -->
    <button type="submit" class="btn-login" id="btnLogin">
      <span class="btn-text">Iniciar sesión</span>
      <span class="spinner" aria-hidden="true"></span>
    </button>

  </form>

  <div class="card-footer">
    ¿Problemas para acceder? Contacta con tu administrador de club.
  </div>

</div>

<script>
  /* ── Config ──────────────────────────────────────────────────────────── */
  const API_BASE = '/api'; // Cambia a tu URL si es necesario

  /* ── Helpers ─────────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);

  function validateDni(value) {
    return /^[0-9]{8}[A-Za-z]$/.test(value.trim());
  }

  function setError(inputEl, msgEl, show) {
    inputEl.classList.toggle('error-input', show);
    msgEl.classList.toggle('visible', show);
  }

  function showAlert(msg) {
    const el = $('alert');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideAlert() {
    $('alert').classList.remove('visible');
  }

  /* ── Toggle password visibility ──────────────────────────────────────── */
  $('togglePw').addEventListener('click', () => {
    const inp = $('password');
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    $('eyeOpen').style.display  = isText ? 'block' : 'none';
    $('eyeClosed').style.display = isText ? 'none'  : 'block';
  });

  /* ── Form submit ─────────────────────────────────────────────────────── */
  $('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const dniVal = $('dni').value.trim().toUpperCase();
    const pwVal  = $('password').value;

    // Validación front
    let valid = true;
    if (!validateDni(dniVal)) { setError($('dni'), $('dni-error'), true);  valid = false; }
    else                       { setError($('dni'), $('dni-error'), false); }
    if (!pwVal)                { setError($('password'), $('pw-error'), true);  valid = false; }
    else                       { setError($('password'), $('pw-error'), false); }

    if (!valid) return;

    // Loading state
    const btn = $('btnLogin');
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ dni: dniVal, password: pwVal }),
      });

      const data = await res.json();

      if (!res.ok) {
        // 422 de Laravel Validation
        const msg = data.errors?.dni?.[0] ?? data.message ?? 'Credenciales incorrectas.';
        showAlert(msg);
        return;
      }

      // Guardar token
      localStorage.setItem('rytmia_token', data.token);
      localStorage.setItem('rytmia_user',  JSON.stringify(data.user));

      // Redirigir según rol
      const redirects = {
        administrador: '/dashboard/admin',
        entrenadora:   '/dashboard/entrenadora',
        gimnasta:      '/dashboard/gimnasta',
      };

      window.location.href = redirects[data.user.rol] ?? '/dashboard';

    } catch (err) {
      showAlert('No se pudo conectar con el servidor. Inténtalo más tarde.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });

  /* ── Auto-uppercase DNI ──────────────────────────────────────────────── */
  $('dni').addEventListener('input', function () {
    const pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  });
</script>

</body>
</html>
